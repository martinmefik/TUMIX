<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Достависта | Реальная доставка из магазинов Москвы</title>
    <!-- Google Maps API (требуется ключ) -->
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&libraries=geometry"></script>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.2s, color 0.2s;
        }
        :root {
            --bg: #f9fafb;
            --card: #ffffff;
            --text: #111827;
            --text-light: #4b5563;
            --border: #e5e7eb;
            --accent: #dc2626;
            --accent-light: #fee2e2;
            --success: #10b981;
            --warning: #f59e0b;
            --shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }
        body.dark {
            --bg: #111827;
            --card: #1f2937;
            --text: #f9fafb;
            --text-light: #9ca3af;
            --border: #374151;
            --accent-light: #2d1f1f;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem;
        }
        /* шапка с адресом */
        .top-bar {
            background: var(--card);
            border-radius: 1.5rem;
            padding: 0.8rem 1.2rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .address-selector {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            cursor: pointer;
            background: var(--accent-light);
            padding: 0.4rem 1rem;
            border-radius: 3rem;
        }
        .address-selector i {
            color: var(--accent);
        }
        .user-info {
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        .icon-btn {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-weight: 500;
            color: var(--text);
        }
        .icon-btn i {
            color: var(--accent);
        }
        .main-grid {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 1.5rem;
        }
        @media (max-width: 800px) {
            .main-grid { grid-template-columns: 1fr; }
        }
        .stores-panel, .catalog-panel {
            background: var(--card);
            border-radius: 1.5rem;
            padding: 1.2rem;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }
        .store-card {
            background: var(--bg);
            border-radius: 1rem;
            padding: 0.8rem;
            margin-bottom: 0.7rem;
            cursor: pointer;
            border-left: 3px solid transparent;
        }
        .store-card.active {
            border-left-color: var(--accent);
            background: var(--accent-light);
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 1rem;
            max-height: 65vh;
            overflow-y: auto;
        }
        .product-card {
            background: var(--bg);
            border-radius: 1rem;
            padding: 0.8rem;
            border: 1px solid var(--border);
        }
        .add-cart {
            background: var(--accent-light);
            border: none;
            width: 100%;
            border-radius: 2rem;
            padding: 0.4rem;
            margin-top: 0.5rem;
            font-weight: 600;
            cursor: pointer;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: var(--card);
            border-radius: 1.5rem;
            max-width: 90vw;
            width: 500px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 1.5rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        input, select {
            width: 100%;
            padding: 0.6rem;
            border-radius: 2rem;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
        }
        .password-strength {
            height: 5px;
            background: #e5e7eb;
            border-radius: 5px;
            margin-top: 5px;
            width: 100%;
        }
        .strength-bar {
            height: 5px;
            border-radius: 5px;
            width: 0%;
        }
        .error {
            color: var(--accent);
            font-size: 0.75rem;
            margin-top: 4px;
        }
        .address-list {
            max-height: 200px;
            overflow-y: auto;
        }
        .address-item {
            padding: 0.5rem;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            padding: 0.5rem;
            border-bottom: 1px solid var(--border);
        }
        .checkout {
            background: var(--accent);
            color: white;
            width: 100%;
            border: none;
            padding: 0.7rem;
            border-radius: 2rem;
            font-weight: bold;
            margin-top: 1rem;
        }
        #map {
            height: 400px;
            width: 100%;
            border-radius: 1rem;
        }
        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--text-light);
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <!-- Верхняя панель: адрес и пользователь -->
    <div class="top-bar" id="topBar">
        <div class="address-selector" id="addressSelector">
            <i class="fas fa-map-marker-alt"></i>
            <span id="currentAddressDisplay">Адрес не выбран</span>
            <i class="fas fa-chevron-down"></i>
        </div>
        <div class="user-info">
            <span id="userGreeting"></span>
            <button id="themeToggle" class="icon-btn"><i class="fas fa-moon"></i> Тема</button>
            <button id="cartBtn" class="icon-btn"><i class="fas fa-shopping-cart"></i> Корзина <span id="cartCount">0</span></button>
            <button id="mapBtn" class="icon-btn"><i class="fas fa-map"></i> Карта</button>
            <button id="profileBtn" class="icon-btn"><i class="fas fa-user"></i> Профиль</button>
        </div>
    </div>

    <div class="main-grid">
        <div class="stores-panel">
            <h3><i class="fas fa-store"></i> Ближайшие магазины</h3>
            <div id="storesList" class="store-list"></div>
            <div style="margin-top:1rem;">
                <button id="refreshStores" class="icon-btn" style="width:100%">Обновить по адресу</button>
            </div>
        </div>
        <div class="catalog-panel">
            <div id="catalogHeader"><h2>Выберите магазин</h2></div>
            <div id="productsContainer" class="products-grid"></div>
        </div>
    </div>
</div>

<!-- Модальные окна -->
<div id="registerModal" class="modal">
    <div class="modal-content">
        <h2>Регистрация</h2>
        <div id="registerForm">
            <div class="form-group"><input type="text" id="regName" placeholder="Имя (только русские буквы)"></div>
            <div class="form-group"><input type="text" id="regLogin" placeholder="Логин"></div>
            <div class="form-group"><input type="password" id="regPassword" placeholder="Пароль"></div>
            <div class="password-strength"><div id="strengthBar" class="strength-bar"></div></div>
            <div id="passwordHint" style="font-size:0.7rem;"></div>
            <div class="form-group"><input type="password" id="regConfirm" placeholder="Подтвердите пароль"></div>
            <button id="doRegister" class="icon-btn" style="width:100%">Зарегистрироваться</button>
        </div>
    </div>
</div>

<div id="addressModal" class="modal">
    <div class="modal-content">
        <h3>Адрес доставки</h3>
        <div id="addressForm">
            <div class="form-group"><input type="text" id="city" placeholder="Город * (только Москва)"></div>
            <div class="form-group"><input type="text" id="street" placeholder="Улица *"></div>
            <div class="form-group"><input type="text" id="house" placeholder="Дом *"></div>
            <div class="form-group"><input type="text" id="building" placeholder="Корпус/строение (необяз.)"></div>
            <div class="form-group"><input type="text" id="entrance" placeholder="Подъезд *"></div>
            <div class="form-group"><input type="text" id="floor" placeholder="Этаж *"></div>
            <div class="form-group"><input type="text" id="apartment" placeholder="Квартира *"></div>
            <div class="form-group"><input type="text" id="intercom" placeholder="Домофон *"></div>
            <div id="cityError" class="error"></div>
            <button id="saveAddressBtn" class="icon-btn" style="width:100%">Сохранить адрес</button>
        </div>
        <hr style="margin:1rem 0">
        <h4>Мои адреса</h4>
        <div id="savedAddressesList" class="address-list"></div>
    </div>
</div>

<div id="cartModal" class="modal">
    <div class="modal-content">
        <h3><i class="fas fa-shopping-cart"></i> Корзина</h3>
        <div id="cartItemsList"></div>
        <div id="cartTotal" class="cart-total"></div>
        <button id="checkoutBtn" class="checkout">Оформить заказ</button>
        <button class="icon-btn close-modal" style="margin-top:1rem;">Закрыть</button>
    </div>
</div>

<div id="mapModal" class="modal">
    <div class="modal-content" style="width:90vw; max-width:1000px;">
        <h3>Магазины на карте</h3>
        <div id="map" style="height:500px;"></div>
        <button class="icon-btn close-modal" style="margin-top:1rem;">Закрыть</button>
    </div>
</div>

<div id="profileModal" class="modal">
    <div class="modal-content">
        <h3>Профиль</h3>
        <p id="profileInfo"></p>
        <button id="logoutBtn" class="icon-btn">Выйти</button>
        <button class="icon-btn close-modal">Закрыть</button>
    </div>
</div>

<script>
    // ======================== РЕАЛЬНЫЕ МАГАЗИНЫ (координаты Москвы) ========================
    const storesData = [
        { id: 1, name: "Пятёрочка", address: "Москва, ул. Тверская, 10", lat: 55.7602, lng: 37.6139, working: "08:00-23:00", rating: "4.5", products: [
            { id: 101, name: "Молоко Простоквашино", price: 79.9, unit: "1л", emoji: "🥛", desc: "2.5%" },
            { id: 102, name: "Хлеб Бородинский", price: 49.9, unit: "шт", emoji: "🍞", desc: "ржаной" },
            { id: 103, name: "Куриное филе", price: 289, unit: "кг", emoji: "🍗", desc: "охлаждённое" }
        ]},
        { id: 2, name: "Магнит", address: "Москва, пр-т Мира, 48", lat: 55.7736, lng: 37.6331, working: "Круглосуточно", rating: "4.3", products: [
            { id: 201, name: "Макароны Makfa", price: 89, unit: "450г", emoji: "🍝", desc: "спиральки" },
            { id: 202, name: "Масло сливочное", price: 139, unit: "180г", emoji: "🧈", desc: "82%" }
        ]},
        { id: 3, name: "Перекрёсток", address: "Москва, ул. Арбат, 25", lat: 55.7524, lng: 37.6034, working: "09:00-22:00", rating: "4.7", products: [
            { id: 301, name: "Лосось слабосоленый", price: 599, unit: "200г", emoji: "🐟", desc: "филе" },
            { id: 302, name: "Авокадо", price: 199, unit: "шт", emoji: "🥑", desc: "Хасс" }
        ]},
        { id: 4, name: "ВкусВилл", address: "Москва, Смоленская пл., 3", lat: 55.7537, lng: 37.5829, working: "09:00-23:00", rating: "4.9", products: [
            { id: 401, name: "Творог 5%", price: 119, unit: "200г", emoji: "🥄", desc: "фермерский" },
            { id: 402, name: "Кефир", price: 79, unit: "500мл", emoji: "🥛", desc: "бифидок" }
        ]}
    ];

    // Глобальные переменные
    let currentUser = null;
    let userAddresses = [];      // массив адресов
    let selectedAddress = null;  // текущий адрес (объект)
    let currentStore = null;
    let cart = [];
    let map = null;
    let markers = [];

    // Фильтр матерных слов (простой список)
    const badWords = ["хуй", "пизда", "бля", "ебан", "залупа", "мудак", "гандон", "пидор", "сука"];
    function isNameValid(name) {
        const cyrillic = /^[а-яёА-ЯЁ\s\-]+$/;
        if (!cyrillic.test(name)) return false;
        const lower = name.toLowerCase();
        for (let w of badWords) if (lower.includes(w)) return false;
        return true;
    }

    // Проверка пароля (длина, буквы, цифры)
    function checkPasswordStrength(pwd) {
        let strength = 0;
        if (pwd.length >= 8) strength++;
        if (/[a-z]/.test(pwd) && /[A-Z]/.test(pwd)) strength++;
        if (/\d/.test(pwd)) strength++;
        if (/[!@#$%^&*]/.test(pwd)) strength++;
        if (strength === 0) return { level: 0, text: "очень слабый", color: "#ef4444", width: "20%" };
        if (strength === 1) return { level: 1, text: "слабый", color: "#f97316", width: "40%" };
        if (strength === 2) return { level: 2, text: "средний", color: "#eab308", width: "60%" };
        if (strength === 3) return { level: 3, text: "хороший", color: "#10b981", width: "80%" };
        return { level: 4, text: "отличный", color: "#10b981", width: "100%" };
    }

    // Сохранение данных в localStorage
    function saveUsers() {
        let users = JSON.parse(localStorage.getItem('delivery_users') || '[]');
        if (currentUser) {
            const existing = users.findIndex(u => u.login === currentUser.login);
            if (existing >= 0) users[existing] = currentUser;
            else users.push(currentUser);
            localStorage.setItem('delivery_users', JSON.stringify(users));
            localStorage.setItem('currentUserLogin', currentUser.login);
        }
        localStorage.setItem('delivery_cart', JSON.stringify(cart));
    }

    function loadData() {
        const users = JSON.parse(localStorage.getItem('delivery_users') || '[]');
        const login = localStorage.getItem('currentUserLogin');
        if (login) {
            currentUser = users.find(u => u.login === login);
            if (currentUser) {
                userAddresses = currentUser.addresses || [];
                selectedAddress = currentUser.currentAddress || (userAddresses.length ? userAddresses[0] : null);
                if (selectedAddress) updateAddressDisplay();
            }
        }
        cart = JSON.parse(localStorage.getItem('delivery_cart') || '[]');
        updateCartUI();
        if (!currentUser) showRegisterModal();
        else renderStoresAndCatalog();
    }

    function updateAddressDisplay() {
        if (selectedAddress) {
            let addr = `${selectedAddress.city}, ${selectedAddress.street} ${selectedAddress.house}`;
            if (selectedAddress.building) addr += ` корп. ${selectedAddress.building}`;
            addr += `, под. ${selectedAddress.entrance}, эт. ${selectedAddress.floor}, кв. ${selectedAddress.apartment}`;
            document.getElementById('currentAddressDisplay').innerText = addr;
        } else {
            document.getElementById('currentAddressDisplay').innerText = "Адрес не выбран";
        }
    }

    function showRegisterModal() {
        document.getElementById('registerModal').classList.add('active');
        setupRegisterEvents();
    }

    function setupRegisterEvents() {
        const pwdInput = document.getElementById('regPassword');
        const strengthBar = document.getElementById('strengthBar');
        const hint = document.getElementById('passwordHint');
        pwdInput.addEventListener('input', () => {
            const val = pwdInput.value;
            const res = checkPasswordStrength(val);
            strengthBar.style.width = res.width;
            strengthBar.style.backgroundColor = res.color;
            hint.innerText = `Надёжность: ${res.text}`;
        });
        document.getElementById('doRegister').onclick = () => {
            const name = document.getElementById('regName').value.trim();
            const login = document.getElementById('regLogin').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;
            if (!name || !login || !password) { alert("Заполните все поля"); return; }
            if (!isNameValid(name)) { alert("Имя должно содержать только русские буквы и не содержать непристойностей"); return; }
            if (password.length < 8 || !/[a-zA-Z]/.test(password) || !/\d/.test(password)) {
                alert("Пароль должен быть не менее 8 символов и содержать буквы и цифры"); return;
            }
            if (password !== confirm) { alert("Пароли не совпадают"); return; }
            const users = JSON.parse(localStorage.getItem('delivery_users') || '[]');
            if (users.find(u => u.login === login)) { alert("Логин уже существует"); return; }
            currentUser = { name, login, password, addresses: [], currentAddress: null };
            saveUsers();
            document.getElementById('registerModal').classList.remove('active');
            // После регистрации показываем форму адреса (обязательно один раз)
            showAddressModal(true);
        };
    }

    function showAddressModal(forceNew = false) {
        const modal = document.getElementById('addressModal');
        modal.classList.add('active');
        // сброс ошибки города
        document.getElementById('cityError').innerText = '';
        const cityInput = document.getElementById('city');
        cityInput.addEventListener('input', function() {
            if (this.value.trim().toLowerCase() !== 'москва') {
                document.getElementById('cityError').innerText = 'город временно не обслуживается, мы еще не доехали туда :)';
                this.style.borderColor = 'red';
            } else {
                document.getElementById('cityError').innerText = '';
                this.style.borderColor = '';
            }
        });
        // заполнение списка адресов
        renderAddressList();
        document.getElementById('saveAddressBtn').onclick = () => {
            const city = document.getElementById('city').value.trim();
            if (city.toLowerCase() !== 'москва') {
                document.getElementById('cityError').innerText = 'город временно не обслуживается, мы еще не доехали туда :)';
                return;
            }
            const street = document.getElementById('street').value.trim();
            const house = document.getElementById('house').value.trim();
            const entrance = document.getElementById('entrance').value.trim();
            const floor = document.getElementById('floor').value.trim();
            const apartment = document.getElementById('apartment').value.trim();
            const intercom = document.getElementById('intercom').value.trim();
            if (!street || !house || !entrance || !floor || !apartment || !intercom) {
                alert("Заполните все обязательные поля (улица, дом, подъезд, этаж, квартира, домофон)");
                return;
            }
            const building = document.getElementById('building').value.trim();
            const newAddr = { city, street, house, building, entrance, floor, apartment, intercom };
            userAddresses.push(newAddr);
            selectedAddress = newAddr;
            currentUser.addresses = userAddresses;
            currentUser.currentAddress = selectedAddress;
            saveUsers();
            updateAddressDisplay();
            modal.classList.remove('active');
            renderStoresAndCatalog();
        };
    }

    function renderAddressList() {
        const container = document.getElementById('savedAddressesList');
        if (!userAddresses.length) { container.innerHTML = '<div class="empty-state">Нет сохранённых адресов</div>'; return; }
        container.innerHTML = userAddresses.map((addr, idx) => `
            <div class="address-item" data-idx="${idx}">
                <i class="fas fa-home"></i> ${addr.city}, ${addr.street} ${addr.house} ${addr.building ? 'корп.'+addr.building : ''}, под.${addr.entrance}, эт.${addr.floor}, кв.${addr.apartment}
                ${selectedAddress === addr ? ' (текущий)' : ''}
            </div>
        `).join('');
        document.querySelectorAll('.address-item').forEach(el => {
            el.addEventListener('click', () => {
                const idx = parseInt(el.dataset.idx);
                selectedAddress = userAddresses[idx];
                currentUser.currentAddress = selectedAddress;
                saveUsers();
                updateAddressDisplay();
                document.getElementById('addressModal').classList.remove('active');
                renderStoresAndCatalog();
            });
        });
    }

    // Гео-расстояние
    function getDistance(lat1, lon1, lat2, lon2) {
        if (typeof google !== 'undefined' && google.maps && google.maps.geometry) {
            const p1 = new google.maps.LatLng(lat1, lon1);
            const p2 = new google.maps.LatLng(lat2, lon2);
            return google.maps.geometry.spherical.computeDistanceBetween(p1, p2) / 1000;
        } else {
            // fallback
            const R = 6371;
            const dLat = (lat2-lat1)*Math.PI/180;
            const dLon = (lon2-lon1)*Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }
    }

    function renderStoresList() {
        if (!selectedAddress) return;
        // координаты адреса? пока нет геокодинга, используем центр Москвы. Для реальной геокодинга нужно API, но для простоты используем фиксированные координаты.
        // В реальном проекте нужно геокодировать адрес через Google. Но для демо используем примерный центр.
        let userLat = 55.7558, userLng = 37.6173;
        // если есть координаты адреса (можно добавить геокодинг, но для упрощения пока так)
        const storesWithDist = storesData.map(s => ({ ...s, dist: getDistance(userLat, userLng, s.lat, s.lng) }));
        storesWithDist.sort((a,b) => a.dist - b.dist);
        const container = document.getElementById('storesList');
        container.innerHTML = storesWithDist.map(store => `
            <div class="store-card ${currentStore && currentStore.id === store.id ? 'active' : ''}" data-id="${store.id}">
                <div><strong>${store.name}</strong></div>
                <div style="font-size:0.7rem;">${store.address}</div>
                <div>${store.working} • ${store.dist.toFixed(1)} км</div>
            </div>
        `).join('');
        document.querySelectorAll('.store-card').forEach(card => {
            card.addEventListener('click', () => {
                const id = parseInt(card.dataset.id);
                currentStore = storesData.find(s => s.id === id);
                renderCatalog(currentStore);
                renderStoresList(); // для подсветки
            });
        });
        if (!currentStore && storesWithDist.length) {
            currentStore = storesWithDist[0];
            renderCatalog(currentStore);
        }
    }

    function renderCatalog(store) {
        const header = document.getElementById('catalogHeader');
        header.innerHTML = `<h2>${store.name}</h2><div>📍 ${store.address} | ⏰ ${store.working} | ⭐ ${store.rating}</div>`;
        const container = document.getElementById('productsContainer');
        container.innerHTML = store.products.map(prod => `
            <div class="product-card">
                <div style="font-size:2rem;">${prod.emoji}</div>
                <div><strong>${prod.name}</strong></div>
                <div>${prod.price} ₽ / ${prod.unit}</div>
                <div style="font-size:0.7rem;">${prod.desc}</div>
                <button class="add-cart" data-prod='${JSON.stringify(prod)}' data-store='${JSON.stringify({id:store.id, name:store.name})}'>В корзину</button>
            </div>
        `).join('');
        document.querySelectorAll('.add-cart').forEach(btn => {
            btn.addEventListener('click', () => {
                const prod = JSON.parse(btn.dataset.prod);
                const storeObj = JSON.parse(btn.dataset.store);
                addToCart(prod, storeObj);
            });
        });
    }

    function addToCart(product, store) {
        const existing = cart.find(i => i.productId === product.id && i.storeId === store.id);
        if (existing) existing.quantity++;
        else cart.push({ productId: product.id, storeId: store.id, storeName: store.name, name: product.name, price: product.price, unit: product.unit, emoji: product.emoji, quantity: 1 });
        saveUsers();
        updateCartUI();
    }

    function updateCartUI() {
        const count = cart.reduce((s,i) => s+i.quantity, 0);
        document.getElementById('cartCount').innerText = count;
        const container = document.getElementById('cartItemsList');
        if (!container) return;
        if (!cart.length) { container.innerHTML = '<div class="empty-state">Корзина пуста</div>'; document.getElementById('cartTotal').innerHTML = ''; return; }
        let total = 0;
        container.innerHTML = cart.map((item, idx) => {
            const sum = item.price * item.quantity;
            total += sum;
            return `<div class="cart-item"><div>${item.emoji} ${item.name} x${item.quantity}<br><small>${item.storeName}</small></div><div>${sum}₽ <button class="icon-btn" onclick="removeFromCart(${idx})"><i class="fas fa-trash"></i></button></div></div>`;
        }).join('');
        document.getElementById('cartTotal').innerHTML = `Итого: ${total.toFixed(2)} ₽`;
    }
    window.removeFromCart = (idx) => {
        cart.splice(idx,1);
        saveUsers();
        updateCartUI();
    };

    function renderStoresAndCatalog() {
        if (selectedAddress) {
            renderStoresList();
        } else {
            document.getElementById('storesList').innerHTML = '<div class="empty-state">Сначала выберите адрес доставки</div>';
        }
    }

    // Инициализация карты Google
    function initMap() {
        if (typeof google === 'undefined') {
            console.warn("Google Maps API не загружен, вставьте ключ");
            return;
        }
        const mapDiv = document.getElementById('map');
        map = new google.maps.Map(mapDiv, { center: { lat: 55.7558, lng: 37.6173 }, zoom: 12 });
        storesData.forEach(store => {
            const marker = new google.maps.Marker({ position: { lat: store.lat, lng: store.lng }, map, title: store.name });
            const info = new google.maps.InfoWindow({ content: `<b>${store.name}</b><br>${store.address}<br><button onclick="window.selectStoreFromMap(${store.id})">Выбрать</button>` });
            marker.addListener('click', () => info.open(map, marker));
            markers.push(marker);
        });
    }
    window.selectStoreFromMap = (id) => {
        currentStore = storesData.find(s => s.id === id);
        renderCatalog(currentStore);
        renderStoresList();
        document.getElementById('mapModal').classList.remove('active');
    };

    // Обработчики модалок
    document.getElementById('addressSelector').addEventListener('click', () => showAddressModal());
    document.getElementById('cartBtn').addEventListener('click', () => { updateCartUI(); document.getElementById('cartModal').classList.add('active'); });
    document.getElementById('mapBtn').addEventListener('click', () => { if (typeof google !== 'undefined') initMap(); document.getElementById('mapModal').classList.add('active'); });
    document.getElementById('profileBtn').addEventListener('click', () => {
        if (currentUser) document.getElementById('profileInfo').innerText = `Имя: ${currentUser.name}\nЛогин: ${currentUser.login}`;
        document.getElementById('profileModal').classList.add('active');
    });
    document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem('currentUserLogin');
        currentUser = null;
        location.reload();
    });
    document.querySelectorAll('.close-modal').forEach(btn => btn.addEventListener('click', function() { this.closest('.modal').classList.remove('active'); }));
    document.getElementById('refreshStores').addEventListener('click', () => renderStoresAndCatalog());
    document.getElementById('checkoutBtn').addEventListener('click', () => alert(`Заказ оформлен! Сумма: ${document.getElementById('cartTotal').innerText}\nСпасибо за покупку!`));
    document.getElementById('themeToggle').addEventListener('click', () => document.body.classList.toggle('dark'));
    if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');

    loadData();
</script>
</body>
</html>
